[build]
  command = "npm run build"

# Run migrations before build whenever this deploy has a DATABASE_URL.
# Production: set DATABASE_URL to your Neon main branch.
# Deploy previews / branch deploys: set DATABASE_URL to a Neon *branch* connection string
# (e.g. Neon Netlify integration injects it per preview). Do not point previews at prod.
[context.production]
  command = "npx prisma migrate deploy && npm run build"

# PR previews are deployed via GitHub Actions (Neon guide); migrations run in CI.
# If Netlify ever builds deploy-preview from Git, same as default build.
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npx prisma migrate deploy && npm run build"

[build.environment]
  NODE_VERSION = "20"
  # NextAuth (build only): Netlify does not inject [build.environment] into Functions at runtime.
  # For production, set AUTH_TRUST_HOST=true in the Netlify UI (scope includes Functions).
  # PR previews: .github/workflows/deploy-preview.yml sets it via netlify env:set.
  AUTH_TRUST_HOST = "true"
  # NEXTAUTH_URL is a public origin (not a password). Next.js/NextAuth inlines it into
  # bundles, which Netlify secrets scanning would otherwise flag as a leak.
  SECRETS_SCAN_OMIT_KEYS = "NEXTAUTH_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  # Prisma: keep the query engine out of the esbuild bundle and ship it as a file
  # (avoids "function has crashed" when the .so.node binary is missing at runtime).
  external_node_modules = ["@prisma/client"]
  included_files = ["node_modules/.prisma/client/**"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
