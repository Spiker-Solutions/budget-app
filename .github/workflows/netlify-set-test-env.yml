name: Netlify Set Test Env

on:
  workflow_dispatch:
  push:

jobs:
  set-test-env:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Set test environment variable
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "PR number not in event payload; resolving from GitHub API."

            OWNER="${GITHUB_REPOSITORY%%/*}"
            REPO="${GITHUB_REPOSITORY##*/}"

            PR_NUMBER="$(curl -sSf \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/commits/${GITHUB_SHA}/pulls" \
              | python -c "import sys,json; d=json.load(sys.stdin); print(d[0]['number'] if isinstance(d,list) and d else '')")"

            if [ -z "${PR_NUMBER:-}" ]; then
              PR_NUMBER="$(curl -sSf \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&head=${OWNER}:${GITHUB_REF_NAME}" \
                | python -c "import sys,json; d=json.load(sys.stdin); print(d[0]['number'] if isinstance(d,list) and d else '')")"
            fi
          fi

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "::error::Could not determine PR number from event, commit, or branch."
            exit 1
          fi

          BASE_DOMAIN="${NEXTAUTH_URL#https://}"
          BASE_DOMAIN="${BASE_DOMAIN#http://}"
          PREVIEW_URL="https://pr-${PR_NUMBER}--${BASE_DOMAIN}"
          DEPLOY_ALIAS="pr-${PR_NUMBER}"

          # Build a one-off env file for this deploy only.
          netlify env:list --context deploy-preview --plain > .env
          echo "NEXTAUTH_URL=${PREVIEW_URL}" >> .env
          echo "TEST_ENVIRONMENT=false" >> .env

          netlify deploy --build --context deploy-preview --alias "${DEPLOY_ALIAS}"
