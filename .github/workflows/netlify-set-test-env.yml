name: Netlify Set Test Env

on:
  workflow_dispatch:
  push:

jobs:
  set-test-env:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Set test environment variable
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "::error::No pull request number found in this event. Use a pull_request-triggered run for preview-specific deploys."
            exit 1
          fi

          BASE_DOMAIN="${NEXTAUTH_URL#https://}"
          BASE_DOMAIN="${BASE_DOMAIN#http://}"
          PREVIEW_URL="https://pr-${PR_NUMBER}--${BASE_DOMAIN}"
          DEPLOY_ALIAS="pr-${PR_NUMBER}"

          # Build a one-off env file for this deploy only.
          netlify env:list --context deploy-preview --plain > .env
          echo "NEXTAUTH_URL=${PREVIEW_URL}" >> .env
          echo "TEST_ENVIRONMENT=false" >> .env

          netlify deploy --build --context deploy-preview --alias "${DEPLOY_ALIAS}"
