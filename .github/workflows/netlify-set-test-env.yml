name: Netlify Set Test Env

on:
  workflow_dispatch:
  push:

jobs:
  set-test-env:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Set test environment variable
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BASE_DOMAIN="${NEXTAUTH_URL#https://}"
          BASE_DOMAIN="${BASE_DOMAIN#http://}"
          PREVIEW_URL="https://pr-${PR_NUMBER}--${BASE_DOMAIN}"

          netlify env:set NEXTAUTH_URL "${PREVIEW_URL}" --context deploy-preview
          netlify env:set TEST_ENVIRONMENT "false" --context deploy-preview
