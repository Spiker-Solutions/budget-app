# Matches https://neon.com/guides/preview-deploys-netlify
# Netlify: Deploy previews = None; production env vars = Production context only.

name: Deploy Preview

on:
  pull_request:

env:
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
  NEON_DATABASE_NAME: ${{ secrets.NEON_DATABASE_NAME }}
  NEON_DATABASE_USERNAME: ${{ secrets.NEON_DATABASE_USERNAME }}
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NEON_PREVIEW_PARENT: ${{ vars.NEON_PREVIEW_PARENT_BRANCH || 'development' }}

jobs:
  deploy-preview:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon branch
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          api_key: ${{ env.NEON_API_KEY }}
          project_id: ${{ env.NEON_PROJECT_ID }}
          database: ${{ env.NEON_DATABASE_NAME }}
          username: ${{ env.NEON_DATABASE_USERNAME }}
          parent: ${{ env.NEON_PREVIEW_PARENT }}
          branch_name: preview/pr-${{ github.event.number }}-${{ steps.branch-name.outputs.current_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run generate-migrate
        env:
          DIRECT_URL: ${{ steps.create-branch.outputs.db_url }}
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}

      - name: Install Netlify CLI
        run: |
          npm install -g netlify-cli@25
          netlify link --id ${{ env.NETLIFY_SITE_ID }} --auth ${{ env.NETLIFY_AUTH_TOKEN }}

      - name: Deploy preview to Netlify
        id: deploy
        env:
          NETLIFY_SITE_SLUG_OVERRIDE: ${{ vars.NETLIFY_SITE_SLUG || secrets.NETLIFY_SITE_SLUG }}
          NEXTAUTH_SECRET_CI: ${{ secrets.NEXTAUTH_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${NEXTAUTH_SECRET_CI:-}" ]; then
            echo "::error::Add NEXTAUTH_SECRET to GitHub Actions secrets (same value as Netlify production)."
            exit 1
          fi
          if [ -n "${NETLIFY_SITE_SLUG_OVERRIDE:-}" ]; then
            SITE_SLUG="${NETLIFY_SITE_SLUG_OVERRIDE}"
          else
            SITE_JSON=$(curl -sSf -H "Authorization: Bearer ${{ env.NETLIFY_AUTH_TOKEN }}" \
              "https://api.netlify.com/api/v1/sites/${{ env.NETLIFY_SITE_ID }}")
            SITE_SLUG=$(echo "$SITE_JSON" | jq -r '.name // empty')
            if [ -z "$SITE_SLUG" ]; then
              echo "::error::Set repository variable NETLIFY_SITE_SLUG (subdomain only, e.g. mrbudgets) or fix NETLIFY_SITE_ID / token."
              exit 1
            fi
          fi
          PREVIEW_URL="https://pr-${{ github.event.number }}--${SITE_SLUG}.netlify.app"
          DB_DIRECT="${{ steps.create-branch.outputs.db_url }}"
          DB_POOLER="${{ steps.create-branch.outputs.db_url_with_pooler }}"
          AUTH="${{ env.NETLIFY_AUTH_TOKEN }}"
          SITE_ID="${{ env.NETLIFY_SITE_ID }}"
          HEAD_REF="${{ github.head_ref }}"

          # Always use --site + --auth so the Netlify *dashboard* and CI target the same site.
          # Netlify scopes: without --scope, vars may be applied to builds but not to Functions/SSR
          # (serverless), so process.env.DATABASE_URL is empty at runtime and Prisma can't connect.
          NETLIFY_SCOPES=(--scope builds functions runtime)
          set_preview_env() {
            local CTX="$1"
            netlify env:set DIRECT_URL "$DB_DIRECT" --context "$CTX" "${NETLIFY_SCOPES[@]}" --force --site "$SITE_ID" --auth "$AUTH"
            netlify env:set DATABASE_URL "$DB_POOLER" --context "$CTX" "${NETLIFY_SCOPES[@]}" --force --site "$SITE_ID" --auth "$AUTH"
            netlify env:set NEXTAUTH_URL "$PREVIEW_URL" --context "$CTX" "${NETLIFY_SCOPES[@]}" --force --site "$SITE_ID" --auth "$AUTH"
            netlify env:set AUTH_TRUST_HOST "true" --context "$CTX" "${NETLIFY_SCOPES[@]}" --force --site "$SITE_ID" --auth "$AUTH"
            netlify env:set NEXTAUTH_SECRET "$NEXTAUTH_SECRET_CI" --context "$CTX" --secret "${NETLIFY_SCOPES[@]}" --force --site "$SITE_ID" --auth "$AUTH"
          }

          # In Netlify UI: Environment variables → "Deploy Previews" and branch-specific values.
          # CLI `netlify deploy --alias=pr-N` can resolve `branch:…` context — mirror to both.
          set_preview_env "deploy-preview"
          set_preview_env "branch:${HEAD_REF}"

          # .env for `netlify deploy --build` on the runner only. Do not merge `netlify env:list`
          # into this file: Next/Vite load first value per key, so a stale DATABASE_URL could win.
          : > .env
          echo "DIRECT_URL=${DB_DIRECT}" >> .env
          echo "DATABASE_URL=${DB_POOLER}" >> .env
          echo "NEXTAUTH_URL=${PREVIEW_URL}" >> .env
          echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET_CI}" >> .env
          echo "AUTH_TRUST_HOST=true" >> .env

          export DATABASE_URL="${DB_POOLER}"
          export DIRECT_URL="${DB_DIRECT}"
          export NEXTAUTH_URL="${PREVIEW_URL}"
          export NEXTAUTH_SECRET="${NEXTAUTH_SECRET_CI}"
          export AUTH_TRUST_HOST="true"

          echo "Waiting 45s for Netlify to apply site env (required before deploy)..."
          sleep 45

          echo "=== Variable names present for deploy-preview on site $SITE_ID (values redacted) ==="
          netlify env:list --context deploy-preview --plain --site "$SITE_ID" --auth "$AUTH" | cut -d= -f1 | sort -u

          netlify deploy --build --alias="pr-${{ github.event.number }}" --context=deploy-preview --site "$SITE_ID" --auth "$AUTH" --json > netlify-deploy.json
          DEPLOY_URL=$(jq -r '.deploy_url' netlify-deploy.json)
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment on pull request
        uses: thollander/actions-comment-pull-request@v2
        with:
          comment_tag: neon-netlify-preview
          mode: recreate
          message: |
            | Resource | Link |
            |----------|------|
            | Netlify preview | ${{ steps.deploy.outputs.deploy_url }} |
            | Neon branch | https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches/${{ steps.create-branch.outputs.branch_id }} |
