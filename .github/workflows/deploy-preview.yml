name: Deploy Preview

on: [pull_request]

env:
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
  NEON_DATABASE_NAME: ${{ secrets.NEON_DATABASE_NAME }}
  NEON_DATABASE_USERNAME: ${{ secrets.NEON_DATABASE_USERNAME }}
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

jobs:
  deploy-preview:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          api_key: ${{ env.NEON_API_KEY }}
          project_id: ${{ env.NEON_PROJECT_ID }}
          database: ${{ env.NEON_DATABASE_NAME }}
          username: ${{ env.NEON_DATABASE_USERNAME }}
          branch_name: preview/pr-${{ github.event.number }}-${{ steps.branch-name.outputs.current_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Migrations
        run: npm run generate-migrate
        env:
          DIRECT_URL: ${{ steps.create-branch.outputs.db_url }}
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}

      - name: Install Netlify CLI
        run: npm install -g netlify-cli && netlify link --id ${{ env.NETLIFY_SITE_ID }} --auth ${{ env.NETLIFY_AUTH_TOKEN }}

      - name: Deploy Preview to Netlify with CLI
        id: deploy
        run: |
          set -euo pipefail
          PR_NUM="${{ github.event.number }}"

          # NextAuth needs a real origin at build time (next-auth/react reads NEXTAUTH_URL when the bundle loads).
          # `netlify deploy` runs the build before we get JSON `deploy_url`, but the preview hostname is fixed:
          #   netlify deploy --alias pr-N  →  https://pr-N--<site-subdomain>.netlify.app
          SITE_JSON="$(netlify api getSite --data "{\"site_id\":\"${NETLIFY_SITE_ID}\"}")"
          SLUG="${{ vars.NETLIFY_SITE_SLUG }}"
          if [ -z "${SLUG}" ]; then
            SLUG="$(echo "$SITE_JSON" | jq -r '(.ssl_url // .url // "") | if type == "string" and test("netlify\\.app") then sub("^https?://"; "") | split(".netlify.app")[0] else empty end')"
          fi
          if [ -z "${SLUG}" ]; then
            SLUG="$(echo "$SITE_JSON" | jq -r '.name // empty')"
          fi
          if [ -z "${SLUG}" ]; then
            echo "Could not resolve Netlify site subdomain. Set the repository variable NETLIFY_SITE_SLUG (e.g. mrbudgets from mrbudgets.netlify.app)."
            exit 1
          fi
          PREVIEW_URL="https://pr-${PR_NUM}--${SLUG}.netlify.app"
          export PREVIEW_URL

          # Pull down the environment variables for the deploy-preview context
          netlify env:list --context deploy-preview --plain >> .env

          # Add the database connection URLs to the .env file
          echo DIRECT_URL="${{ steps.create-branch.outputs.db_url }}" >> .env
          echo DATABASE_URL="${{ steps.create-branch.outputs.db_url_with_pooler }}" >> .env

          # Remove any NEXTAUTH_URL* lines from Netlify's export (empty values break next-auth; wrong values break login).
          node -e "
            const fs = require('fs');
            const path = '.env';
            const lines = fs.readFileSync(path, 'utf8').split(/\r?\n/).filter((l) => !/^NEXTAUTH_URL(_INTERNAL)?=/.test(l));
            fs.writeFileSync(path, lines.join('\n').replace(/\n+$/, '') + '\n');
            fs.appendFileSync(path, 'NEXTAUTH_URL=' + process.env.PREVIEW_URL + '\n');
          "

          # Deploy the preview to Netlify
          netlify deploy --alias="pr-${PR_NUM}" --context=deploy-preview --json > netlify-deploy.json

          # Get the deploy URL from the netlify-deploy.json file
          DEPLOY_URL="$(jq -r '.deploy_url' netlify-deploy.json)"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

          if [ "$DEPLOY_URL" != "$PREVIEW_URL" ]; then
            echo "::warning::deploy_url ($DEPLOY_URL) differs from NEXTAUTH_URL used for build ($PREVIEW_URL). If login fails, align alias / subdomain logic with Netlify's actual preview hostname."
          fi

      - name: Comment on Pull Request
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            | Resource | Link |
            |----------|------|
            | Netlify Preview 🚀 | ${{ steps.deploy.outputs.deploy_url }} |
            | Neon branch 🐘 | https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches/${{ steps.create-branch.outputs.branch_id }} |