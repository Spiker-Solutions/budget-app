name: Deploy Preview

on: [pull_request]

env:
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
  NEON_DATABASE_NAME: ${{ secrets.NEON_DATABASE_NAME }}
  NEON_DATABASE_USERNAME: ${{ secrets.NEON_DATABASE_USERNAME }}
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

jobs:
  deploy-preview:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          api_key: ${{ env.NEON_API_KEY }}
          project_id: ${{ env.NEON_PROJECT_ID }}
          database: ${{ env.NEON_DATABASE_NAME }}
          username: ${{ env.NEON_DATABASE_USERNAME }}
          branch_name: preview/pr-${{ github.event.number }}-${{ steps.branch-name.outputs.current_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Migrations
        run: npm run generate-migrate
        env:
          DIRECT_URL: ${{ steps.create-branch.outputs.db_url }}
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}

      - name: Install Netlify CLI
        run: npm install -g netlify-cli && netlify link --id ${{ env.NETLIFY_SITE_ID }} --auth ${{ env.NETLIFY_AUTH_TOKEN }}

      - name: Deploy Preview to Netlify with CLI
        id: deploy
        env:
          NEXTAUTH_HOST_SUFFIX: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET_CI: ${{ secrets.NEXTAUTH_SECRET }}
        run: |
          set -euo pipefail
          PR_NUM="${{ github.event.number }}"

          if [ -z "${NEXTAUTH_SECRET_CI:-}" ]; then
            echo "::error::Add NEXTAUTH_SECRET to repository secrets (same value as production / Netlify)."
            exit 1
          fi

          # Repository secret NEXTAUTH_URL = Netlify site host only (e.g. mrbudgets.netlify.app).
          # Preview origin: https://pr-<PR#>--<that-host> (matches netlify deploy --alias pr-<PR#>).
          HOST_SUFFIX="$(node -e "
            const raw = (process.env.NEXTAUTH_HOST_SUFFIX || '').trim();
            const u = raw.replace(/^https?:\\/\\//i, '').replace(/\\/$/, '').trim();
            if (!u || u.includes('/')) {
              console.error('Set repository secret NEXTAUTH_URL to your Netlify hostname only, e.g. mrbudgets.netlify.app (no https://, no path).');
              process.exit(1);
            }
            console.log(u);
          ")"
          PREVIEW_URL="https://pr-${PR_NUM}--${HOST_SUFFIX}"
          export PREVIEW_URL

          netlify env:list --context deploy-preview --plain >> .env
          echo DIRECT_URL="${{ steps.create-branch.outputs.db_url }}" >> .env
          echo DATABASE_URL="${{ steps.create-branch.outputs.db_url_with_pooler }}" >> .env

          node -e "
            const fs = require('fs');
            const path = '.env';
            const strip = /^(NEXTAUTH_URL(_INTERNAL)?|NEXTAUTH_SECRET|AUTH_TRUST_HOST)=/;
            const lines = fs.readFileSync(path, 'utf8').split(/\r?\n/).filter((l) => !strip.test(l));
            fs.writeFileSync(path, lines.join('\n').replace(/\n+$/, '') + '\n');
            fs.appendFileSync(path, 'NEXTAUTH_URL=' + process.env.PREVIEW_URL + '\n');
            fs.appendFileSync(path, 'NEXTAUTH_SECRET=' + process.env.NEXTAUTH_SECRET_CI + '\n');
            fs.appendFileSync(path, 'AUTH_TRUST_HOST=true\n');
          "

          netlify deploy --alias="pr-${PR_NUM}" --context=deploy-preview --json > netlify-deploy.json

          DEPLOY_URL="$(jq -r '.deploy_url' netlify-deploy.json)"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

          if [ "$DEPLOY_URL" != "$PREVIEW_URL" ]; then
            echo "::warning::deploy_url ($DEPLOY_URL) differs from expected preview URL ($PREVIEW_URL). If login fails, check NEXTAUTH_URL secret (hostname suffix) and Netlify alias pattern."
          fi

      - name: Comment on Pull Request
        uses: thollander/actions-comment-pull-request@v2
        with:
          comment_tag: neon-netlify-preview
          mode: recreate
          message: |
            | Resource | Link |
            |----------|------|
            | Netlify Preview 🚀 | ${{ steps.deploy.outputs.deploy_url }} |
            | Neon branch 🐘 | https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches/${{ steps.create-branch.outputs.branch_id }} |
