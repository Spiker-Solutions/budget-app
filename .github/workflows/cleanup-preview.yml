# Deletes the Neon database branch when the PR closes.
# Branch name must match deploy-preview.yml (Neon create-branch-action).

name: Delete preview Neon branch

on:
  pull_request:
    types: [closed]

env:
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}

jobs:
  delete-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Branch name must match deploy-preview.yml (Neon create-branch-action).
      - name: Delete Neon branch
        run: npx neonctl@latest branches delete "preview/pr-${{ github.event.number }}-${{ github.head_ref }}" --project-id "${{ env.NEON_PROJECT_ID }}"
        env:
          NEON_API_KEY: ${{ env.NEON_API_KEY }}
